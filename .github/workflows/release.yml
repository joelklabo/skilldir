name: Release

on:
  push:
    branches: ['main']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # npm publishing is intentionally deferred. Changesets still manages
      # versioning/release PR flow, and the publish step is an explicit no-op.
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: 'echo "npm publish is not configured yet"'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
